<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BizCalc</title>
    <script>
      // ─────────────────────────────────────
      //  Works for both:
      //  GitHub Pages → yourusername.github.io/bizcalc/
      //  Custom domain → yourdomain.com/
      // ─────────────────────────────────────
      (function () {
        const path   = window.location.pathname;
        const search = window.location.search;
        const hash   = window.location.hash;

        // Save full intended URL
        sessionStorage.setItem('redirect', path + search + hash);

        // Detect base and redirect to app root
        const isGitHubPages = path.startsWith('/bizcalc');
        const root          = isGitHubPages ? '/bizcalc/' : '/';

        window.location.replace(root);
      })();
    </script>
  </head>
  <body>
    <p style="
      font-family: sans-serif;
      text-align: center;
      margin-top: 80px;
      color: #888;
    ">
      Redirecting to BizCalc...
    </p>
  </body>
</html>
