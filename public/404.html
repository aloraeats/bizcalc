<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BizCalc</title>
    <script>
      (function () {
        var path   = window.location.pathname;
        var search = window.location.search;
        var hash   = window.location.hash;

        // Save the full intended URL
        sessionStorage.setItem('redirect', path + search + hash);

        // Detect base and redirect to app root
        var isGitHubPages = path.indexOf('/bizcalc') === 0;
        var root          = isGitHubPages ? '/bizcalc/' : '/';

        window.location.replace(root);
      })();
    </script>
  </head>
  <body>
    <p style="
      font-family: sans-serif;
      text-align: center;
      margin-top: 80px;
      color: #888;
    ">
      Redirecting to BizCalc...
    </p>
  </body>
</html>
